<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quick User Registration Test</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
        max-width: 600px;
      }
      .form-group {
        margin: 15px 0;
      }
      label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
      }
      input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
      }
      button {
        padding: 10px 20px;
        background: #28a745;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        margin: 5px;
      }
      button:hover {
        background: #218838;
      }
      .result {
        padding: 10px;
        margin: 10px 0;
        border-radius: 5px;
      }
      .success {
        background: #d4edda;
        color: #155724;
      }
      .error {
        background: #f8d7da;
        color: #721c24;
      }
    </style>
  </head>
  <body>
    <h1>🧪 User Registration & Login Test</h1>

    <div>
      <h2>📝 Register Test User</h2>
      <div class="form-group">
        <label for="username">Username:</label>
        <input
          type="text"
          id="username"
          value="testuser"
          placeholder="Enter username"
        />
      </div>
      <div class="form-group">
        <label for="email">Email:</label>
        <input
          type="email"
          id="email"
          value="test@example.com"
          placeholder="Enter email"
        />
      </div>
      <div class="form-group">
        <label for="password">Password:</label>
        <input
          type="password"
          id="password"
          value="Test123!"
          placeholder="Enter password"
        />
      </div>
      <button onclick="registerUser()">Register User</button>
    </div>

    <div>
      <h2>🔐 Test Login</h2>
      <div class="form-group">
        <label for="loginEmail">Email:</label>
        <input
          type="email"
          id="loginEmail"
          value="test@example.com"
          placeholder="Enter email"
        />
      </div>
      <div class="form-group">
        <label for="loginPassword">Password:</label>
        <input
          type="password"
          id="loginPassword"
          value="Test123!"
          placeholder="Enter password"
        />
      </div>
      <button onclick="loginUser()">Test Login</button>
    </div>

    <div id="results"></div>

    <script>
      const API_BASE_URL = "http://localhost:3001";

      function addResult(message, type = "info") {
        const resultsDiv = document.getElementById("results");
        const resultDiv = document.createElement("div");
        resultDiv.className = `result ${type}`;
        resultDiv.innerHTML = message;
        resultsDiv.appendChild(resultDiv);
      }

      async function registerUser() {
        const username = document.getElementById("username").value;
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        if (!username || !email || !password) {
          addResult("❌ Please fill in all fields", "error");
          return;
        }

        addResult("📝 Registering user...", "info");

        try {
          const response = await fetch(`${API_BASE_URL}/signup`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              username,
              email,
              password,
            }),
          });

          const data = await response.json();

          if (data.success) {
            addResult(
              `✅ User registered successfully! User ID: ${data.userId}`,
              "success"
            );
          } else {
            addResult(`⚠️ Registration failed: ${data.message}`, "error");
          }
        } catch (error) {
          addResult(`❌ Registration error: ${error.message}`, "error");
        }
      }

      async function loginUser() {
        const email = document.getElementById("loginEmail").value;
        const password = document.getElementById("loginPassword").value;

        if (!email || !password) {
          addResult("❌ Please fill in email and password", "error");
          return;
        }

        addResult("🔐 Testing login...", "info");

        try {
          const response = await fetch(`${API_BASE_URL}/login`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              email,
              password,
            }),
          });

          const data = await response.json();

          if (data.success) {
            addResult(
              `✅ Login successful! Welcome ${data.user.username}`,
              "success"
            );
            addResult(
              `👤 User data: <pre>${JSON.stringify(data.user, null, 2)}</pre>`,
              "success"
            );
          } else {
            addResult(`⚠️ Login failed: ${data.message}`, "error");
          }
        } catch (error) {
          addResult(`❌ Login error: ${error.message}`, "error");
        }
      }
    </script>
  </body>
</html>
